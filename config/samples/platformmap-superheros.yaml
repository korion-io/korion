apiVersion: korion.io/v1alpha1
kind: PlatformMap
metadata:
  name: superheros-platform
  namespace: superheros
spec:
  repository: https://github.com/gc-ghub/project-gc-industries-devops-superheros
  namespace: superheros
  autoDiscover: true
  tools:
    argocd:
      enabled: true
      url: "" # auto-detected if empty
    kiali:
      enabled: true
    prometheus:
      enabled: true
      # Set this to your Prometheus query endpoint. Left empty, the discoverer
      # falls back to a best-effort same-namespace guess
      # (http://prometheus.<namespace>.svc.cluster.local:9090), which is rarely
      # right -- Prometheus usually lives in a monitoring namespace. For a
      # kube-prometheus-stack install this is typically:
      url: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
    loki:
      enabled: true
    github:
      enabled: true
      # Create with:
      #   kubectl -n superheros create secret generic korion-github-secret \
      #     --from-literal=token=<a GitHub PAT with repo + actions:read>
      tokenSecretRef:
        name: korion-github-secret
        key: token
  refreshInterval: 30s
