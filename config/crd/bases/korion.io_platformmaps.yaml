kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: platformmaps.korion.io
spec:
  group: korion.io
  names:
    kind: PlatformMap
    listKind: PlatformMapList
    plural: platformmaps
    singular: platformmap
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.namespace
      name: Namespace
      type: string
    - jsonPath: .status.lastDiscoveryTime
      name: Discovered
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
