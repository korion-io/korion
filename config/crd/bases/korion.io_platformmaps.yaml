                          target namespace.
                        type: string
                    required:
                    - enabled
                    type: object
                  kiali:
                    description: |-
                      ToolConfig is the common per-tool auto-discovery toggle shared by
                      integrations that need no more than an enabled flag and an optional
                      endpoint override.
                    properties:
                      enabled:
                        description: Enabled turns on discovery for this tool.
                        type: boolean
                      url:
                        description: |-
                          URL overrides auto-detection of the tool's API endpoint. Left empty,
                          Korion auto-detects the endpoint from well-known Service names in the
                          target namespace.
                        type: string
                    required:
                    - enabled
                    type: object
                  kyverno:
                    description: |-
                      ToolConfig is the common per-tool auto-discovery toggle shared by
                      integrations that need no more than an enabled flag and an optional
                      endpoint override.
                    properties:
                      enabled:
                        description: Enabled turns on discovery for this tool.
                        type: boolean
                      url:
                        description: |-
                          URL overrides auto-detection of the tool's API endpoint. Left empty,
                          Korion auto-detects the endpoint from well-known Service names in the
                          target namespace.
                        type: string
                    required:
                    - enabled
                    type: object
                  loki:
                    description: |-
                      ToolConfig is the common per-tool auto-discovery toggle shared by
                      integrations that need no more than an enabled flag and an optional
                      endpoint override.
                    properties:
                      enabled:
                        description: Enabled turns on discovery for this tool.
                        type: boolean
                      url:
                        description: |-
                          URL overrides auto-detection of the tool's API endpoint. Left empty,
                          Korion auto-detects the endpoint from well-known Service names in the
                          target namespace.
                        type: string
                    required:
                    - enabled
                    type: object
                  prometheus:
                    description: |-
                      ToolConfig is the common per-tool auto-discovery toggle shared by
                      integrations that need no more than an enabled flag and an optional
                      endpoint override.
                    properties:
                      enabled:
                        description: Enabled turns on discovery for this tool.
                        type: boolean
                      url:
                        description: |-
                          URL overrides auto-detection of the tool's API endpoint. Left empty,
                          Korion auto-detects the endpoint from well-known Service names in the
                          target namespace.
                        type: string
                    required:
                    - enabled
                    type: object
                type: object
            required:
            - namespace
            type: object
          status:
            description: |-
              PlatformMapStatus reports the last discovered topology and per-source
              discovery health.
            properties:
              conditions:
                description: |-
                  Conditions report discovery health per source (e.g. ArgoCDDetected,
                  IstioDetected), keyed by Condition.Type.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastDiscoveryTime:
                description: |-
                  LastDiscoveryTime is when the controller last completed a full
                  discovery reconcile.
                format: date-time
                type: string
              topology:
                description: |-
                  Topology is the discovered platform graph, serialized as opaque JSON.
                  The concrete Node/Edge schema is frozen against internal/graph in a
                  later phase; this field stays untyped here to avoid coupling the API
                  package to an internal package before that contract is frozen.
                type: object
                x-kubernetes-preserve-unknown-fields: true
            type: object
