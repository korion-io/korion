    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PlatformMap triggers auto-discovery of a platform's full DevOps stack
          (GitHub Actions, ArgoCD, Kubernetes, Istio, Kyverno, Prometheus) and
          renders the result as an interactive topology graph.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PlatformMapSpec defines the desired discovery configuration for a
              platform's DevOps stack.
            properties:
              autoDiscover:
                default: true
                description: AutoDiscover enables automatic discovery of the full
                  DevOps stack.
                type: boolean
              namespace:
                description: Namespace is the target Kubernetes namespace to discover.
                minLength: 1
                type: string
              refreshInterval:
                default: 30s
                description: RefreshInterval controls how often the controller re-runs
                  discovery.
                type: string
              repository:
                description: |-
                  Repository is the source Git repository URL for the platform being
                  mapped.
                type: string
              tools:
                description: Tools configures which discovery integrations are enabled.
                properties:
                  argocd:
                    description: |-
                      ToolConfig is the common per-tool auto-discovery toggle shared by
                      integrations that need no more than an enabled flag and an optional
                      endpoint override.
                    properties:
                      enabled:
                        description: Enabled turns on discovery for this tool.
                        type: boolean
                      url:
                        description: |-
                          URL overrides auto-detection of the tool's API endpoint. Left empty,
                          Korion auto-detects the endpoint from well-known Service names in the
                          target namespace.
                        type: string
                    required:
                    - enabled
                    type: object
                  github:
                    description: |-
                      GitHubToolConfig configures GitHub Actions discovery, which additionally
                      requires an API token to read workflow run status.
                    properties:
                      enabled:
                        description: Enabled turns on discovery for this tool.
                        type: boolean
                      tokenSecretRef:
                        description: TokenSecretRef references the Secret key holding
                          a GitHub API token.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must
                              be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must
                              be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                      url:
                        description: URL overrides auto-detection of the tool's API
                          endpoint.
                        type: string
                    required:
                    - enabled
                    type: object
                  istio:
                    description: |-
                      ToolConfig is the common per-tool auto-discovery toggle shared by
                      integrations that need no more than an enabled flag and an optional
                      endpoint override.
                    properties:
                      enabled:
                        description: Enabled turns on discovery for this tool.
                        type: boolean
                      url:
                        description: |-
                          URL overrides auto-detection of the tool's API endpoint. Left empty,
