---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - korion.io
  resources:
  - platformmaps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - korion.io
  resources:
  - platformmaps/status
  verbs:
  - get
  - patch
  - update
