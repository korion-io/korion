name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: make license-check

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go vet ./...
        if: hashFiles('go.sum') != ''
      - run: make test
        if: hashFiles('go.sum') != ''

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
        if: hashFiles('ui/package-lock.json') != ''
      - name: Install and build
        working-directory: ui
        run: |
          if [ -f package-lock.json ]; then
            npm ci
            npm run build --if-present
            npm test --if-present
          else
            echo "ui/ not scaffolded yet, skipping"
          fi

  aria:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        working-directory: aria
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pytest tests/ -v
          else
            echo "aria/ not scaffolded yet, skipping"
          fi
