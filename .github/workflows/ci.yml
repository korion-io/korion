name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: make license-check

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet ./...
        if: hashFiles('go.sum') != ''
      - run: make test
        if: hashFiles('go.sum') != ''

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
        if: hashFiles('ui/package-lock.json') != ''
      - name: Install and build
        working-directory: ui
        run: |
          if [ -f package-lock.json ]; then
            # npm install (not npm ci): package-lock.json is authored on a
            # Windows host, which never records the linux-only optional native
            # subtrees (@emnapi/*, @tailwindcss/oxide native binding), so strict
            # `npm ci` fails its sync check on Linux. Matches ui/Dockerfile.
            npm install --no-audit --no-fund
            npm run build --if-present
            npm test --if-present
          else
            echo "ui/ not scaffolded yet, skipping"
          fi

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - name: Lint chart
        run: helm lint helm/korion
      - name: Render chart (default + key overrides)
        run: |
          # Fail on any template error. Rendering with --include-crds and a
          # couple of representative override sets is the "helm template
          # snapshot test" the plan calls for -- it catches template regressions
          # without pinning brittle golden output.
          helm template korion helm/korion -n korion-system --include-crds > /dev/null
          helm template korion helm/korion -n korion-system --set ui.enabled=false > /dev/null
          helm template korion helm/korion -n korion-system \
            --set ui.ingress.enabled=true \
            --set discovery.tools.github.enabled=false > /dev/null

  aria:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        working-directory: aria
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pytest tests/ -v
          else
            echo "aria/ not scaffolded yet, skipping"
          fi

  e2e:
    # Phase 8: hermetic SuperHeros v0.1 acceptance on Kind + Helm. Reproduces
    # the ArgoCD/Istio/Kyverno discovery path via CRDs + sample CRs (no
    # heavyweight controllers); GitHub/Prometheus are disabled in the fixture
    # PlatformMap (they need a real token/endpoint -- see test/e2e/ACCEPTANCE.md).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - name: Install kind
        run: |
          curl -sSLo ./kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
      - name: Assert-logic unit tests
        run: python test/e2e/assert_acceptance_test.py
      - name: Acceptance harness
        if: hashFiles('go.sum') != ''
        run: bash test/e2e/run-acceptance.sh
