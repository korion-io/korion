# Baked-in default for standalone `docker run` of the UI image. Serves the
# single-page app with history-API fallback. It does NOT proxy /api/ -- that
# requires knowing the controller Service address, which is a cluster concern
# supplied by the Helm chart's ConfigMap (helm/korion/templates/ui-configmap.yaml),
# mounted over this file in cluster.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
