apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "korion.controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "korion.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "korion.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "korion.controller.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "korion.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "korion.controller.image" . }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          args:
            - --metrics-bind-address=:{{ .Values.controller.ports.metrics }}
            - --health-probe-bind-address=:{{ .Values.controller.ports.health }}
            - --api-bind-address=:{{ .Values.controller.ports.api }}
            - --enable-argocd={{ .Values.discovery.tools.argocd.enabled }}
            - --enable-istio={{ .Values.discovery.tools.istio.enabled }}
            - --enable-kyverno={{ .Values.discovery.tools.kyverno.enabled }}
            - --enable-github={{ .Values.discovery.tools.github.enabled }}
            - --enable-prometheus={{ .Values.discovery.tools.prometheus.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.controller.ports.metrics }}
            - name: health
              containerPort: {{ .Values.controller.ports.health }}
            - name: api
              containerPort: {{ .Values.controller.ports.api }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
