{{- if .Values.ui.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "korion.ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "korion.ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    {{- include "korion.ui.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
